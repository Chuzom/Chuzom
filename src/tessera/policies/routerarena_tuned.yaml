      - openrouter/x-ai/grok-4.3
      - openrouter/qwen/qwen3-235b-a22b-2507
      - openrouter/anthropic/claude-sonnet-4
      - openai/o3
    research:
      - openrouter/anthropic/claude-sonnet-4
      - openrouter/qwen/qwen3-235b-a22b-2507
      - openai/o3
    generate:
      - openrouter/anthropic/claude-sonnet-4
      - openrouter/deepseek/deepseek-v4-flash
      - openai/o3
    analyze:
      - openrouter/x-ai/grok-4.3
