name: routerarena_tuned
description: |
  DEPRECATED ALIAS — renamed to ``cost_aggressive`` in v10.0.0 to drop
  the leaderboard-specific branding. The strategy is generic: cheap
  open-weight workhorses + per-subject specialists, useful to any
  cost-conscious production user.

  This shim ships through v10.x so existing
  ``TESSERA_POLICY=routerarena_tuned`` configs keep working. Migrate
  to ``TESSERA_POLICY=cost_aggressive`` — the YAML below is a
  byte-identical copy of policies/cost_aggressive.yaml and will be
  removed in v11.

confidence_threshold: 3
skip_acknowledgements: true
route_coordination: false
prefer_ollama: true

workhorses:
  - ollama/qwen3.5:latest
  - openrouter/qwen/qwen3-235b-a22b-2507
  - openrouter/deepseek/deepseek-v4-flash
  - openrouter/google/gemini-3.1-flash-lite
  - codex/gpt-5.4

specialists:
  code: openrouter/qwen/qwen3-coder-next
  cloze: openrouter/qwen/qwen3-next-80b-a3b-instruct
  narrative: openrouter/deepseek/deepseek-v4-flash
  history: openrouter/google/gemini-3.1-flash-lite
  medical: openrouter/google/gemini-3.1-flash-lite
  physics: openrouter/deepseek/deepseek-v4-flash
  reasoning: openrouter/x-ai/grok-4.3

fallback_chain_complex:
  - openrouter/qwen/qwen3-235b-a22b-2507
  - openrouter/deepseek/deepseek-v4-flash
  - openrouter/anthropic/claude-sonnet-4
  - openai/o3

cost_cap_per_query: 0.05

chains:
  budget:
    query:
      - ollama/qwen3.5:latest
      - openrouter/google/gemini-3.1-flash-lite
      - openrouter/qwen/qwen3-235b-a22b-2507
      - openrouter/deepseek/deepseek-v4-flash
      - codex/gpt-5.4
    research:
      - openrouter/qwen/qwen3-235b-a22b-2507
      - openrouter/google/gemini-3.1-flash-lite
      - codex/gpt-5.4
    generate:
      - ollama/qwen3.5:latest
      - openrouter/google/gemini-3.1-flash-lite
      - openrouter/deepseek/deepseek-v4-flash
      - openrouter/qwen/qwen3-235b-a22b-2507
    analyze:
      - openrouter/qwen/qwen3-235b-a22b-2507
      - openrouter/deepseek/deepseek-v4-flash
      - codex/gpt-5.4
    code:
      - openrouter/qwen/qwen3-coder-next
      - openrouter/qwen/qwen3-235b-a22b-2507
      - openrouter/deepseek/deepseek-v4-flash
      - codex/gpt-5.4
  balanced:
    query:
      - ollama/qwen3.5:latest
      - openrouter/qwen/qwen3-235b-a22b-2507
      - openrouter/deepseek/deepseek-v4-flash
      - openrouter/google/gemini-3.1-flash-lite
      - codex/gpt-5.4
    research:
      - openrouter/qwen/qwen3-235b-a22b-2507
      - openrouter/deepseek/deepseek-v4-flash
      - codex/gpt-5.4
    generate:
      - openrouter/deepseek/deepseek-v4-flash
      - openrouter/qwen/qwen3-235b-a22b-2507
      - openrouter/google/gemini-3.1-flash-lite
      - codex/gpt-5.4
    analyze:
      - openrouter/qwen/qwen3-235b-a22b-2507
      - openrouter/deepseek/deepseek-v4-flash
      - openrouter/x-ai/grok-4.3
      - codex/gpt-5.4
    code:
      - openrouter/qwen/qwen3-coder-next
      - openrouter/qwen/qwen3-235b-a22b-2507
      - codex/gpt-5.4
  premium:
