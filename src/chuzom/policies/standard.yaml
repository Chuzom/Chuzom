name: standard
description: |
  Plan 07 Phase 1b.1 — data-file mirror of profiles.py ROUTING_TABLE.
  Every chain below is byte-identical to the hardcoded dict in profiles.py.
  Wiring callers (router.py, auto-route.py, dynamic_routing.py, etc.) to
  consult this file is deferred to Phase 1b.2; for now it is the canonical
  *target* the runtime will migrate to, validated by tests/test_standard_policy_mirror.py.

# ── Behavior knobs (defaults; not overridden today) ───────────────────────────
confidence_threshold: 4
skip_acknowledgements: true
route_coordination: false
prefer_ollama: true

# ── Plan 07 model-strategy fields ─────────────────────────────────────────────
# Convenience pointers — explicit (no auto-derive) so the YAML is the
# single source of truth at read time. Test enforces these match the
# corresponding chains entries.
workhorses:
  - ollama/qwen3:32b
  - codex/gpt-4o
  - moonshot/moonshot-v1-128k
  - zhipu/glm-4
  - deepseek/deepseek-chat
  - openai/gpt-4o
  - anthropic/claude-sonnet-4-6
  - anthropic/claude-haiku-4-5-20251001

fallback_chain_complex:
  - anthropic/claude-opus:latest
  - anthropic/claude-sonnet-4-6
  - deepseek/deepseek-chat
  - openai/gpt-4o
  - openai/o3
  - xai/grok-3
  - ollama/qwen3:32b

specialists: {}

# ── Full chain mirror — byte-for-byte equal to profiles.ROUTING_TABLE ─────────
chains:
  budget:
    query:
      - ollama/hermes3:8b
      - codex/gpt-4o-mini
      - moonshot/moonshot-v1-8k
      - minimax/MiniMax-Text-01
      - zhipu/glm-4-flash
      - groq/llama-3.3-70b-versatile
      - deepseek/deepseek-chat
      - openai/gpt-4o-mini
      - anthropic/claude-haiku-4-5-20251001
    research:
      - ollama/hermes3:8b
      - minimax/MiniMax-Text-01
      - anthropic/claude-haiku-4-5-20251001
      - openai/gpt-4o-mini
    generate:
      - ollama/hermes3:8b
      - codex/gpt-4o-mini
      - moonshot/moonshot-v1-8k
      - arcee/arcee-nova
      - deepseek/deepseek-chat
      - mistral/mistral-small-latest
      - openai/gpt-4o-mini
      - anthropic/claude-haiku-4-5-20251001
    analyze:
      - ollama/hermes3:8b
      - codex/gpt-4o-mini
      - zhipu/glm-4-flash
      - deepseek/deepseek-reasoner
      - groq/llama-3.3-70b-versatile
      - openai/gpt-4o-mini
      - anthropic/claude-haiku-4-5-20251001
    code:
      - ollama/hermes3:8b
      - codex/gpt-4o-mini
      - moonshot/moonshot-v1-8k
      - deepseek/deepseek-chat
      - groq/llama-3.3-70b-versatile
      - openai/gpt-4o-mini
      - anthropic/claude-haiku-4-5-20251001
    image:
      - fal/flux-dev
      - stability/stable-diffusion-3
      - openai/dall-e-2
    video:
      - fal/minimax-video
      - replicate/minimax-video
    audio:
      - openai/tts-1
      - elevenlabs/eleven_multilingual_v2

  balanced:
    query:
      - ollama/qwen3:32b
      - codex/gpt-4o
      - moonshot/moonshot-v1-128k
      - zhipu/glm-4
      - deepseek/deepseek-chat
      - openai/gpt-4o
      - anthropic/claude-sonnet-4-6
      - anthropic/claude-haiku-4-5-20251001
    research:
      - ollama/qwen3:32b
      - minimax/MiniMax-Text-01
      - anthropic/claude-sonnet-4-6
      - openai/gpt-4o
    generate:
      - ollama/qwen3:32b
      - codex/gpt-4o
      - arcee/arcee-nova
      - deepseek/deepseek-chat
      - openai/gpt-4o
      - cohere/command-r-plus
      - anthropic/claude-sonnet-4-6
      - anthropic/claude-haiku-4-5-20251001
    analyze:
      - ollama/qwen3:32b
      - codex/gpt-4o
      - zhipu/glm-4
      - deepseek/deepseek-reasoner
      - openai/gpt-4o
      - anthropic/claude-sonnet-4-6
      - anthropic/claude-haiku-4-5-20251001
    code:
      - ollama/qwen3:32b
      - codex/gpt-4o
      - moonshot/moonshot-v1-128k
      - deepseek/deepseek-chat
      - openai/gpt-4o
      - anthropic/claude-sonnet-4-6
      - anthropic/claude-haiku-4-5-20251001
    image:
      - fal/flux-pro
      - openai/dall-e-3
      - stability/stable-diffusion-3
    video:
      - fal/kling-video
      - runway/gen3a_turbo
      - replicate/minimax-video
    audio:
      - elevenlabs/eleven_multilingual_v2
      - openai/tts-1-hd

  # PREMIUM = Complexity.COMPLEX. Strong models lead; Ollama is last-resort only
  # (complex tasks should NOT be answered by a local model unless every API is down).
  premium:
    query:
      - anthropic/claude-opus:latest
      - anthropic/claude-sonnet-4-6
      - deepseek/deepseek-chat
      - openai/gpt-4o
      - openai/o3
      - xai/grok-3
      - ollama/qwen3:32b
    research:
      - anthropic/claude-opus:latest
      - minimax/MiniMax-Text-01
      - openai/o3
      - ollama/qwen3:32b
    generate:
      - anthropic/claude-opus:latest
      - anthropic/claude-sonnet-4-6
      - arcee/arcee-nova
      - deepseek/deepseek-chat
      - openai/gpt-4o
      - openai/o3
      - ollama/qwen3:32b
    analyze:
      - anthropic/claude-opus:latest
      - anthropic/claude-sonnet-4-6
      - zhipu/glm-4
      - deepseek/deepseek-reasoner
      - openai/o3
      - ollama/qwen3:32b
    code:
      - anthropic/claude-opus:latest
      - anthropic/claude-sonnet-4-6
      - moonshot/moonshot-v1-128k
      - deepseek/deepseek-reasoner
      - openai/gpt-4o
      - openai/o3
      - ollama/qwen3:32b
    image:
      - openai/dall-e-3
      - fal/flux-pro
      - stability/stable-diffusion-3-ultra
    video:
      - runway/gen3a
      - fal/kling-video
    audio:
      - elevenlabs/eleven_multilingual_v2
      - openai/tts-1-hd

  # ── REASONING: dedicated extended-thinking chain ─────────────────────────────
  # Triggered by Complexity.DEEP_REASONING — formal proofs, first-principles
  # derivation, multi-step deductive chains, philosophical analysis, and any
  # prompt that explicitly asks for step-by-step / chain-of-thought reasoning.
  #
  # Model strategy (ordered cheapest-capable-first, escalate on failure):
  #   1. DeepSeek-R1         — $0.0014/1K, best cost-adjusted reasoning benchmark
  #   2. OpenAI o3           — frontier reasoning for the hardest problems
  #   3. Claude Opus         — use_thinking=True (extended thinking, budget=16K)
  #   4. Gemini 2.5 Pro / Claude Sonnet — thinking-capable fallbacks
  #   5. Claude Fable 5      — last-resort escalation: the most sophisticated and
  #                            most expensive model ($10/$50 per 1M). Reached only
  #                            after the cheaper reasoning specialists have failed,
  #                            so its cost is spent only when nothing else sufficed.
  #   6. Ollama local qwen3  — free absolute-last fallback; supports /think natively
  #
  # use_thinking=True is set by the router for ALL models in this chain;
  # only Anthropic and Gemini 2.5 Pro activate a provider-specific thinking
  # parameter — o3 and DeepSeek-R1 reason natively without an explicit flag.
  # REASONING = Complexity.DEEP_REASONING. Native reasoning models lead; Fable 5
  # is the paid escalation ceiling above them; Ollama is the free last resort
  # (the hardest problems should not fall to a local model first).
  reasoning:
    query:
      - deepseek/deepseek-reasoner
      - openai/o3
      - anthropic/claude-opus:latest
      - anthropic/claude-sonnet-4-6
      - anthropic/claude-fable-5
      - ollama/qwen3:32b
    analyze:
      - deepseek/deepseek-reasoner
      - openai/o3
      - anthropic/claude-opus:latest
      - anthropic/claude-sonnet-4-6
      - anthropic/claude-fable-5
      - ollama/qwen3:32b
    code:
      - deepseek/deepseek-reasoner
      - openai/o3
      - anthropic/claude-opus:latest
      - anthropic/claude-sonnet-4-6
      - anthropic/claude-fable-5
      - ollama/qwen3:32b
    research:
      - deepseek/deepseek-reasoner
      - openai/o3
      - anthropic/claude-opus:latest
      - anthropic/claude-fable-5
      - ollama/qwen3:32b
    generate:
      - deepseek/deepseek-reasoner
      - openai/o3
      - anthropic/claude-opus:latest
      - anthropic/claude-sonnet-4-6
      - anthropic/claude-fable-5
      - ollama/qwen3:32b
    image:
      - openai/dall-e-3
      - fal/flux-pro
      - stability/stable-diffusion-3-ultra
    video:
      - runway/gen3a
      - fal/kling-video
    audio:
      - elevenlabs/eleven_multilingual_v2
      - openai/tts-1-hd
