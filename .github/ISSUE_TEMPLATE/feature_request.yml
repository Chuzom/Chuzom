name: Feature request
description: Suggest an improvement or new capability for chuzom
labels: ["enhancement"]
body:
  - type: textarea
    id: problem-motivation
    attributes:
      label: Problem or motivation
      description: What problem would this solve? Who is affected?
      placeholder: Describe the use case or limitation.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: Describe the behavior, API, or workflow you would like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or alternative designs have you considered?
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add screenshots, examples, links, or related issues.
    validations:
      required: false
