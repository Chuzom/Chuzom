name: Smoke Test — Fresh Install

# Verifies that a freshly installed chuzom works end-to-end across Python
# versions, operating systems, and installer tools (pip / pipx / uv).
# Each job: install → hooks → classify a prompt → verify routing response.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke:
    name: ${{ matrix.os }} · py${{ matrix.python }} · ${{ matrix.installer }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12"]
        installer: [pip, uv]
        exclude:
          # pipx on Windows runners can be flaky with path resolution — use pip
          - os: windows-latest
            installer: uv

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        if: matrix.installer == 'uv'
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install chuzom via pip
        if: matrix.installer == 'pip'
        run: pip install -e ".[dev]"

      - name: Install chuzom via uv
        if: matrix.installer == 'uv'
        run: uv pip install -e ".[dev]" --system

      - name: Verify CLI is importable
        run: python -c "import chuzom; print('chuzom imported OK')"

      - name: Verify router config loads
        run: python -c "from chuzom.config import RouterConfig; cfg = RouterConfig(); print('RouterConfig OK')"

      - name: Verify hook classifies and routes a simple prompt
        shell: bash
        run: |
          python - <<'PY'
          import sys, json, subprocess, os
          hook = 'src/chuzom/hooks/auto-route.py'
          payload = json.dumps({'prompt': 'What is 2+2?', 'session_id': 'smoke-test'})
          env = {**os.environ, 'CHUZOM_DIRECT_EXECUTION': 'false', 'CHUZOM_DISABLE_LLM_CLASSIFIERS': '1'}
          r = subprocess.run([sys.executable, hook], input=payload, capture_output=True, text=True, env=env, timeout=10)
          assert r.returncode == 0, f'hook exit {r.returncode}: {r.stderr}'
          output = next((l for l in r.stdout.splitlines() if l.startswith('{')), r.stdout)
          data = json.loads(output)
          assert 'decision' in data, f'missing decision: {data}'
          print(f'hook classified OK: decision={data["decision"]}')
          PY

      - name: Verify research routes to llm_research (not Ollama)
        shell: bash
        run: |
          python - <<'PY'
          import sys, json, subprocess, os
          hook = 'src/chuzom/hooks/auto-route.py'
          payload = json.dumps({'prompt': 'What is the latest AI news in 2026?', 'session_id': 'smoke-research'})
          env = {
              **os.environ,
              'CHUZOM_DIRECT_EXECUTION': 'false',
              'CHUZOM_DISABLE_LLM_CLASSIFIERS': '1',
          }
          r = subprocess.run([sys.executable, hook], input=payload, capture_output=True, text=True, env=env, timeout=10)
          assert r.returncode == 0, f'hook exit {r.returncode}: {r.stderr}'
          output = next((l for l in r.stdout.splitlines() if l.startswith('{')), r.stdout)
          data = json.loads(output)
          ctx = (data.get('hookSpecificOutput') or {}).get('additionalContext', '')
          assert 'llm_research' in ctx, f'research prompt did not route to llm_research. ctx={ctx[:200]}'
          print('research → llm_research ✓')
          PY

      - name: Verify sync chain_builder returns empty for research
        run: |
          python -c "
          from chuzom.hooks.chain_builder import build_chain
          chain = build_chain('simple', 'green', 'research')
          assert chain == [], f'Expected empty chain for research, got: {chain}'
          print('chain_builder research bypass ✓')
          "

      - name: Verify install_hooks runs without error (dry-run)
        run: |
          python -c "
          import os, tempfile, sys
          # Point HOME at a temp dir so we don't pollute the real ~/.claude
          with tempfile.TemporaryDirectory() as tmp:
              os.environ['HOME'] = tmp
              try:
                  from chuzom.install_hooks import install
                  actions = install()
                  print(f'install() returned {len(actions)} actions')
              except Exception as e:
                  # Acceptable: may fail on Windows if Git Bash absent, etc.
                  print(f'install() raised (expected on some platforms): {e}')
          "
