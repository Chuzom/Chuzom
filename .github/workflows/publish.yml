name: Publish to PyPI

# PyPI publishing is PAUSED — the project is not ready to publish yet.
# The pipeline is kept fully intact (build, lint, version-check, OIDC publish)
# but only runs on manual dispatch, so pushing a `v*` tag no longer triggers a
# publish. To RESUME automated releases, restore the tag trigger:
#   on:
#     push:
#       tags:
#         - "v*"
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write  # required for OIDC trusted publisher

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest
    environment: pypi

    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.11

      - name: Lint
        run: uvx ruff check src/ tests/

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Verify tag matches pyproject.toml version
        env:
          TAG_REF: ${{ github.ref_name }}
        run: |
          TAG="${TAG_REF#v}"
          PKG=$(uv run python -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          echo "Tag version:     $TAG"
          echo "Package version: $PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "ERROR: git tag v$TAG does not match pyproject.toml version $PKG"
            exit 1
          fi

      - name: Build
        run: uv build

      - name: Sign distributions (GPG)
        if: vars.GPG_SIGNING_ENABLED == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "GPG_PRIVATE_KEY secret not configured, skipping signing"
            exit 0
          fi

          # Import the private key
          echo "$GPG_PRIVATE_KEY" | gpg --import --batch --no-tty 2>/dev/null || true

          # Sign all distribution files
          for file in dist/*; do
            if [[ "$file" != *.asc && "$file" != *.sig ]]; then
              echo "Signing $file..."
              gpg --batch --no-tty --passphrase "$GPG_PASSPHRASE" \
                  --detach-sign --armor "$file"
            fi
          done

          echo "✅ Distributions signed with GPG"
          ls -la dist/

      - name: Publish to PyPI
        # Trusted publishing (OIDC): NO password — auth comes from the `pypi`
        # environment + `id-token: write`. Passing a `password:` would switch
        # the action to token auth; omitting it commits cleanly to OIDC.
        # Requires a PyPI publisher registered for: project chuzom-router,
        # owner Chuzom, repo chuzom, workflow publish.yml, environment pypi.
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip_existing: true
