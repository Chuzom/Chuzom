name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan catches newly disclosed CVEs in unchanged deps.
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write   # upload SARIF to the Security tab
  actions: read            # SARIF fingerprinting reads the workflow run (else 403)

env:
  UV_HTTP_TIMEOUT: 30

jobs:
  # ── Supply-chain CVE scan — REPORT-ONLY, ratchets to a gate ───────────────
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv python install 3.11
      - name: Audit dependencies for known CVEs
        # Audit the EXPORTED dependency tree, not the installed env (the root
        # project isn't on PyPI at this version). --no-emit-project drops it.
        #
        # NON-BLOCKING for now: the locked tree has known CVEs (litellm, pyjwt,
        # urllib3, starlette, python-multipart, pygments). Dependabot opens the
        # bump PRs; once they land, drop `continue-on-error` to make this a hard
        # gate again. The findings stay visible in the job log meanwhile.
        continue-on-error: true
        run: |
          uv export --no-emit-project --no-hashes -o /tmp/requirements.txt
          uvx pip-audit --strict --requirement /tmp/requirements.txt

  # ── Static security analysis (bandit) — REPORT, ratchets to gate ──────────
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv python install 3.11
      - name: Run bandit (SARIF to Security tab)
        # NOTE: non-blocking until S3 (replace shell=True in
        # hooks/agent_loop.py with an argv list). Once that lands, drop
        # continue-on-error so bandit becomes a required check.
        continue-on-error: true
        run: |
          uv run --with 'bandit[sarif]' bandit \
            -r src/chuzom -ll -f sarif -o bandit.sarif || true
      - name: Upload bandit SARIF
        # Best-effort: the Security tab upload needs code scanning enabled in
        # repo Settings → Code security. Until then the upload 403s — don't
        # fail CI over a repo-level feature toggle. bandit findings are in the
        # job log regardless.
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif
          category: bandit

  # ── CodeQL deep semantic analysis — reports to Security tab ───────────────
  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended
      - name: Perform CodeQL analysis
        # Best-effort: the results upload needs code scanning enabled in repo
        # Settings → Code security. Until then it 403s on the SARIF upload —
        # don't fail CI over a repo-level toggle. Drop continue-on-error once
        # code scanning is enabled to make CodeQL a required check.
        continue-on-error: true
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
