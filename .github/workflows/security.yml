name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan catches newly disclosed CVEs in unchanged deps.
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write   # upload SARIF to the Security tab
  actions: read            # SARIF fingerprinting reads the workflow run (else 403)

env:
  UV_HTTP_TIMEOUT: 30

jobs:
  # ── Supply-chain CVE scan — REPORT-ONLY, ratchets to a gate ───────────────
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv python install 3.11
      - name: Audit dependencies for known CVEs
        # REPORT-ONLY. Audits the EXPORTED dependency tree (--no-emit-project
        # drops the unpublished root project). The flagged packages are bumped
        # forward to reduce the CVE count, but the transitive tree carries a
        # steady stream of freshly-disclosed 2026 CVEs (aiohttp, cryptography,
        # idna, …) — a hard gate would break CI weekly on deps we don't control.
        # Dependabot drives the incremental bumps; findings stay in the job log.
        # Ratchet back to --strict (drop continue-on-error) once the tree is
        # clean and bumps are cadenced.
        continue-on-error: true
        run: |
          uv export --no-emit-project --no-hashes -o /tmp/requirements.txt
          uvx pip-audit --strict --requirement /tmp/requirements.txt

  # ── Static security analysis (bandit) — REPORT, ratchets to gate ──────────
  bandit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv python install 3.11
      - name: Bandit high-severity gate
        # HARD GATE on high-severity findings (e.g. a re-introduced shell=True).
        # S3 removed the only high finding, so this passes today and blocks
        # regressions. Medium findings (B608 f-string SQL, B310 urlopen) are
        # reported via SARIF below but not gated — they need per-finding triage.
        run: uv run --with bandit bandit -r src/chuzom --severity-level high -q
      - name: Bandit SARIF (all findings to Security tab)
        run: |
          uv run --with 'bandit[sarif]' bandit \
            -r src/chuzom -ll -f sarif -o bandit.sarif || true
      - name: Upload bandit SARIF
        # Best-effort: the Security tab upload needs code scanning enabled in
        # repo Settings → Code security. Until then the upload 403s — don't
        # fail CI over a repo-level feature toggle. bandit findings are in the
        # job log regardless.
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bandit.sarif
          category: bandit

  # ── CodeQL deep semantic analysis — reports to Security tab ───────────────
  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-extended
      - name: Perform CodeQL analysis
        # Best-effort: the results upload needs code scanning enabled in repo
        # Settings → Code security. Until then it 403s on the SARIF upload —
        # don't fail CI over a repo-level toggle. Drop continue-on-error once
        # code scanning is enabled to make CodeQL a required check.
        continue-on-error: true
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
