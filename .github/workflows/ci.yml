name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  UV_HTTP_TIMEOUT: 30

jobs:
  public-import-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for forbidden enterprise imports
        run: bash scripts/check_public_imports.sh

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
        continue-on-error: true
        id: uv-setup
      - name: Retry uv setup
        if: steps.uv-setup.outcome == 'failure'
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false
      - run: uv python install 3.11
      - run: uvx ruff check src/ tests/

  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
        continue-on-error: true
        id: uv-setup
      - name: Retry uv setup
        if: steps.uv-setup.outcome == 'failure'
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false
      - run: uv python install 3.11
      - name: Verify version sync
        run: uv run python scripts/verify-version-sync.py

  plugin-sync-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
        continue-on-error: true
        id: uv-setup
      - name: Retry uv setup
        if: steps.uv-setup.outcome == 'failure'
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false
      - run: uv python install 3.11
      - name: Verify plugin distribution sync
        run: python scripts/verify-plugin-sync.py

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
        continue-on-error: true
        id: uv-setup
      - name: Retry uv setup
        if: steps.uv-setup.outcome == 'failure'
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        shell: bash
        run: |
          # Run pytest in the background so we can detect the aiosqlite thread hang.
          # pytest writes junit xml before the hang; we read that to determine pass/fail.
          # NOTE: do NOT add --cov here. Coverage instrumentation slows the
          # full suite past the 280s watchdog below, so pytest never writes
          # junit before the timeout fires → "Could not read junit xml". Run
          # coverage in a separate, unwrapped job if/when it's needed (N1).
          uv run pytest tests/ -q \
            --ignore=tests/test_agno_integration.py \
            --timeout=30 \
            --junit-xml=/tmp/pytest-results.xml &
          PYTEST_PID=$!

          # Wait up to 280s for pytest to exit normally. The full suite is
          # ~150s; 280s leaves margin so the watchdog only fires on a real
          # aiosqlite exit-hang, not a merely-slow run (job timeout is 10m).
          for i in $(seq 1 280); do
            if ! kill -0 $PYTEST_PID 2>/dev/null; then
              wait $PYTEST_PID
              exit $?
            fi
            sleep 1
          done

          # Still running after 150s — pytest is hanging on exit (aiosqlite thread).
          # Read the junit xml written before the hang to determine true pass/fail.
          echo "pytest is hanging on exit — reading junit results..."
          python3 - <<'PY'
          import sys, xml.etree.ElementTree as ET
          try:
              root = ET.parse("/tmp/pytest-results.xml").getroot()
              suite = root if root.tag == "testsuite" else root.find("testsuite")
              failures = int(suite.get("failures", 0))
              errors   = int(suite.get("errors",   0))
              tests    = int(suite.get("tests",     0))
              print(f"junit: {tests} tests, {failures} failures, {errors} errors")
              sys.exit(1 if (failures or errors) else 0)
          except Exception as e:
              print(f"Could not read junit xml: {e}")
              sys.exit(1)
          PY
          result=$?
          kill $PYTEST_PID 2>/dev/null || true
          exit $result

  public-build-verify:
    # PUBLIC-ONLY BUILD: Verify the public distribution contains no enterprise code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
        continue-on-error: true
        id: uv-setup
      - name: Retry uv setup
        if: steps.uv-setup.outcome == 'failure'
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false
      - run: uv python install 3.11
      - name: Build public package
        run: uv run python -m build
      - name: Verify enterprise code not in wheel
        run: |
          wheel_file=$(find dist -name "*.whl" | head -1)
          if unzip -l "$wheel_file" | grep -q "chuzom/enterprise"; then
            echo "❌ ERROR: Enterprise code found in wheel!"
            exit 1
          fi
          echo "✓ Enterprise code not in wheel"
      - name: Verify enterprise code not in sdist
        run: |
          sdist_file=$(find dist -name "*.tar.gz" | head -1)
          if tar tzf "$sdist_file" | grep -q "chuzom/enterprise"; then
            echo "❌ ERROR: Enterprise code found in sdist!"
            exit 1
          fi
          echo "✓ Enterprise code not in sdist"

  postgres-budget:
    # P1-5: run the real-Postgres multi-instance budget acceptance test
    # (100 concurrent try_reserve across 4 processes against a $5 cap → exactly
    # 50 succeed). The default `test` job skips it via importorskip("psycopg"),
    # so the multi-instance enforcement claim was never CI-proven. The test uses
    # testcontainers and Docker is available on ubuntu-latest, so it spins up
    # postgres:16-alpine itself — no `services:` block needed.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
        continue-on-error: true
        id: uv-setup
      - name: Retry uv setup
        if: steps.uv-setup.outcome == 'failure'
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies (postgres integration extra)
        run: uv sync --extra dev --extra postgres-test

      - name: Run Postgres budget acceptance test
        run: uv run pytest tests/test_t2_xl1_postgres_budget_backend.py -v
