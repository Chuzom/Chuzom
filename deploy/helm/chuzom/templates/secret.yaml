{{- $hasSecret := false -}}
{{- range $k, $v := .Values.secrets }}{{- if $v }}{{- $hasSecret = true }}{{- end }}{{- end }}
{{- if or $hasSecret .Values.budget.postgresDsn }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "chuzom.fullname" . }}
  labels:
    {{- include "chuzom.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $k, $v := .Values.secrets }}
  {{- if $v }}
  {{ $k }}: {{ $v | quote }}
  {{- end }}
  {{- end }}
  {{- if .Values.budget.postgresDsn }}
  CHUZOM_BUDGET_POSTGRES_DSN: {{ .Values.budget.postgresDsn | quote }}
  {{- end }}
{{- end }}
