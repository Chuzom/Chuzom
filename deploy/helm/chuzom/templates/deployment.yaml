apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chuzom.fullname" . }}
  labels:
    {{- include "chuzom.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "chuzom.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "chuzom.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: chuzom
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["serve", "--host", "0.0.0.0", "--port", "{{ .Values.service.port }}"]
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          {{- if .Values.probes.enabled }}
          # P1-4: the default entrypoint serves SSE (mcp.sse_app()) with no
          # unauthenticated /health route, so probe the listen port at the TCP
          # layer — a successful connect proves the server accepts traffic. For
          # the admin entrypoint (chuzom serve --admin) switch to an httpGet on
          # /v1/admin/health.
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
          env:
            - name: CHUZOM_DEPLOYMENT_PROFILE
              value: {{ .Values.deploymentProfile | quote }}
            - name: CHUZOM_SSE_ALLOW_PUBLIC
              value: {{ .Values.sseAllowPublic | quote }}
            - name: CHUZOM_QUOTA_MODE
              value: {{ .Values.quotaMode | quote }}
            - name: CHUZOM_LOG_JSON
              value: {{ .Values.logJson | quote }}
            - name: CHUZOM_BUDGET_BACKEND
              value: {{ .Values.budget.backend | quote }}
            {{- if .Values.oidc.issuer }}
            - name: CHUZOM_OIDC_ISSUER
              value: {{ .Values.oidc.issuer | quote }}
            - name: CHUZOM_OIDC_AUDIENCE
              value: {{ .Values.oidc.audience | quote }}
            - name: CHUZOM_OIDC_ROLE_MAP
              value: {{ .Values.oidc.roleMap | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "chuzom.fullname" . }}
                optional: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
