# Tessera Model Registry
#
# Sourced primarily from https://artificialanalysis.ai/leaderboards/models
# Refresh periodically via scripts/refresh-model-registry.py.
#
# Schema (all required unless marked optional):
#   id                       canonical "provider/model-name" string
#   provider                 provider slug for grouping
#   tier                     local | cheap | mid | premium | unknown
#   quality_score            0.0–1.0, normalized from AA composite
#   price_per_1m_input_usd   USD per 1M input tokens
#   price_per_1m_output_usd  USD per 1M output tokens
#   latency_p50_ms (opt)     observed median latency
#   context_window (opt)     in tokens
#   capabilities (opt)       list: function-calling, vision, json, web-grounded, reasoning
#   source (opt)             provenance (defaults to artificialanalysis.ai)
#   notes (opt)              free text

